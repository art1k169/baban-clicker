<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Evolution: Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --main: #ffcc00;
            --main-soft: rgba(255, 204, 0, 0.1);
            --panel: rgba(20, 20, 20, 0.9);
            --border: rgba(50, 50, 50, 0.5);
            --text-dark: #888;
            --success: #2ecc71;
            --blue: #3498db;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* --- Окно уведомления --- */
        #custom-alert {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            opacity: 0;
            pointer-events: none;
            transition: 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        #custom-alert.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .alert-btn { background: var(--main); color: black; border: none; padding: 10px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; }

        /* --- Регулировка звука --- */
        .volume-control {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: var(--main);
        }

        /* --- Интерфейс --- */
        .main-stage { display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .stats-count { font-size: 6rem; font-weight: 900; color: var(--main); text-shadow: 0 0 40px rgba(255, 204, 0, 0.6); line-height: 1; }
        .stats-power { font-size: 1.1rem; color: var(--text-dark); margin-top: 5px; display: flex; gap: 20px; font-weight: 700; }
        #main-image { width: 400px; height: 400px; object-fit: contain; cursor: pointer; transition: 0.1s; }

        .side-panels-container { position: fixed; top: 20px; bottom: 20px; left: 20px; right: 20px; pointer-events: none; display: flex; justify-content: space-between; }
        .panel { width: 280px; background: var(--panel); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid var(--border); padding: 25px; pointer-events: auto; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .panel-header { font-size: 11px; font-weight: 700; color: var(--text-dark); text-transform: uppercase; letter-spacing: 2px; }

        .upgrade-btn { width: 100%; padding: 15px; background: var(--success); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .upgrade-btn.auto { background: var(--blue); }
        .upgrade-btn:disabled { background: #333; opacity: 0.5; cursor: not-allowed; }

        .selector-grid { display: flex; flex-direction: column; gap: 10px; }
        .selector-card { padding: 12px; background: rgba(40,40,40,0.5); border-radius: 16px; border: 2px solid transparent; text-align: center; cursor: pointer; transition: 0.3s; }
        .selector-card.active { border-color: var(--main); background: var(--main-soft); }
        .selector-card img { width: 45px; height: 45px; display: block; margin: 0 auto 8px; border-radius: 8px; }
        .price-tag { font-size: 10px; color: var(--main); font-weight: 900; }

        .plus-one { position: fixed; color: var(--main); font-weight: 900; font-size: 40px; pointer-events: none; animation: floatUp 0.7s ease-out forwards; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="custom-alert">
        <h2 id="alert-title">Внимание</h2>
        <p id="alert-msg"></p>
        <button class="alert-btn" onclick="closeAlert()">ОК</button>
    </div>

    <div class="main-stage">
        <div class="stats-count" id="counter">0</div>
        <div class="stats-power">
            <span id="power-display">Клик: +1</span>
            <span id="auto-display" style="color: var(--blue);">Авто: +0/сек</span>
        </div>
        <img src="банан.png" id="main-image">
    </div>

    <div class="side-panels-container">
        <div class="panel">
            <div class="panel-header">Прокачка</div>
            <button class="upgrade-btn" id="upgrade-btn" onclick="buyUpgrade()">Клик +1</button>
            <button class="upgrade-btn auto" id="auto-upgrade-btn" onclick="buyAutoUpgrade()">Авто-клик +1</button>
            
            <div class="panel-header" style="margin-top: 15px;">Настройки звука</div>
            <div class="volume-control">
                <span id="vol-val" style="font-size: 10px; color: #ccc;">Громкость: 50%</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
            </div>
            <div style="display:flex; gap:10px; margin-top: 10px;">
                <div class="selector-card active" id="snd1" onclick="setSound('звук нажатия.mp3', 'snd1')" style="flex:1">🔊<span>Звук 1</span></div>
                <div class="selector-card" id="snd2" onclick="setSound('звук нажатия2.mp3', 'snd2')" style="flex:1">🔉<span>Звук 2</span></div>
            </div>
        </div>

        <div class="panel" style="width: 250px;">
            <div class="panel-header">Скины</div>
            <div class="selector-grid" id="skin-list"></div>
        </div>
    </div>

    <script>
        let clicks = parseInt(localStorage.getItem('b_clicks')) || 0;
        let power = parseInt(localStorage.getItem('b_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('b_auto_power')) || 0;
        let volume = parseFloat(localStorage.getItem('b_volume')) || 0.5;
        let currentSkin = localStorage.getItem('b_skin') || 'банан.png';
        let currentSound = localStorage.getItem('b_sound') || 'звук нажатия.mp3';
        let unlockedSkins = JSON.parse(localStorage.getItem('b_unlocked')) || ['skin0'];

        // Анти-чит переменные
        let lastClickTime = 0;
        let clickHistory = []; 
        let isFrozen = false;

        const skinsDB = [
            { id: 'skin0', name: 'Банан', file: 'банан.png', price: 0 },
            { id: 'skin_pupu', name: 'Пу-пу-пу', file: 'пу-пу-пу.png', price: 1000 },
            { id: 'skin_burm', name: 'Бурмолдан', file: 'банан-бурмолдан.png', price: 5000 },
            { id: 'skin_bak', name: 'Бак', file: 'бак.png', price: 1000000 },
            { id: 'skin_svin', name: 'Свинобан', file: 'свинобан.png', price: 20000000 }
        ];

        document.getElementById('volume-slider').value = volume;
        document.getElementById('vol-val').innerText = `Громкость: ${Math.round(volume * 100)}%`;

        function changeVolume(v) {
            volume = v;
            localStorage.setItem('b_volume', volume);
            document.getElementById('vol-val').innerText = `Громкость: ${Math.round(v * 100)}%`;
        }

        function showAlert(title, msg) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert').classList.add('show');
        }

        function closeAlert() { document.getElementById('custom-alert').classList.remove('show'); }

        setInterval(() => { if (autoPower > 0) { clicks += autoPower; updateUI(); } }, 1000);

        function updateUI() {
            document.getElementById('counter').innerText = clicks.toLocaleString('ru-RU');
            document.getElementById('power-display').innerText = `Клик: +${power}`;
            document.getElementById('auto-display').innerText = `Авто: +${autoPower}/сек`;
            
            let upCost = power * 1000;
            let autoCost = (autoPower + 1) * 10000;
            document.getElementById('upgrade-btn').innerText = `Клик +1 (${upCost.toLocaleString()})`;
            document.getElementById('upgrade-btn').disabled = clicks < upCost;
            document.getElementById('auto-upgrade-btn').innerText = `Авто +1 (${autoCost.toLocaleString()})`;
            document.getElementById('auto-upgrade-btn').disabled = clicks < autoCost;

            localStorage.setItem('b_clicks', clicks);
            localStorage.setItem('b_power', power);
            localStorage.setItem('b_auto_power', autoPower);
            renderSkins();
        }

        function renderSkins() {
            const container = document.getElementById('skin-list');
            container.innerHTML = '';
            skinsDB.forEach(skin => {
                const isUnlocked = unlockedSkins.includes(skin.id);
                const isActive = currentSkin === skin.file;
                const card = document.createElement('div');
                card.className = `selector-card ${isActive ? 'active' : ''}`;
                card.onclick = () => handleSkinClick(skin);
                card.innerHTML = `
                    <img src="${skin.file}" class="${!isUnlocked ? 'grayscale' : ''}">
                    <span>${skin.name}</span>
                    ${isUnlocked ? '' : `<div class="price-tag">КУПИТЬ: ${skin.price.toLocaleString()}</div>`}
                `;
                container.appendChild(card);
            });
        }

        function handleSkinClick(skin) {
            if (unlockedSkins.includes(skin.id)) {
                currentSkin = skin.file;
                document.getElementById('main-image').src = skin.file;
                localStorage.setItem('b_skin', skin.file);
            } else if (clicks >= skin.price) {
                clicks -= skin.price;
                unlockedSkins.push(skin.id);
                localStorage.setItem('b_unlocked', JSON.stringify(unlockedSkins));
                currentSkin = skin.file;
                document.getElementById('main-image').src = skin.file;
            } else {
                showAlert('Магазин', 'Недостаточно кликов!');
            }
            updateUI();
        }

        document.getElementById('main-image').onmousedown = (e) => {
            if (isFrozen) return;

            const now = Date.now();
            const interval = now - lastClickTime;
            
            // --- СИСТЕМА ОПРЕДЕЛЕНИЯ АВТОКЛИКЕРА ---
            clickHistory.push(interval);
            if (clickHistory.length > 10) clickHistory.shift();

            if (clickHistory.length === 10) {
                // Вычисляем вариативность (стандартное отклонение)
                const avg = clickHistory.reduce((a, b) => a + b) / 10;
                const variance = clickHistory.map(x => Math.pow(x - avg, 2)).reduce((a, b) => a + b) / 10;

                // Если вариативность почти нулевая (клики идеально ровные), это бот
                if (variance < 2 && avg < 100) { 
                    activateAntiCheat("Обнаружен скрипт (идеальный ритм)!");
                    return;
                }
                
                // Если кликов слишком много в секунду
                if (avg < 50) { 
                    activateAntiCheat("Превышен лимит CPS!");
                    return;
                }
            }

            lastClickTime = now;
            clicks += power;
            
            let audio = new Audio(currentSound);
            audio.volume = volume;
            audio.play();

            const p = document.createElement('div');
            p.innerText = `+${power}`;
            p.className = 'plus-one';
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);

            e.target.style.transform = 'scale(0.85)';
            setTimeout(() => e.target.style.transform = 'scale(1)', 50);
            updateUI();
        };

        function activateAntiCheat(reason) {
            isFrozen = true;
            document.getElementById('main-image').style.filter = 'grayscale(1) opacity(0.3)';
            showAlert('Анти-чит', `${reason} Бан на 5 секунд.`);
            setTimeout(() => {
                isFrozen = false;
                document.getElementById('main-image').style.filter = 'none';
                closeAlert();
                clickHistory = [];
            }, 5000);
        }

        function buyUpgrade() { let cost = power * 1000; if (clicks >= cost) { clicks -= cost; power++; updateUI(); } }
        function buyAutoUpgrade() { let cost = (autoPower + 1) * 10000; if (clicks >= cost) { clicks -= cost; autoPower++; updateUI(); } }
        function setSound(f, id) { currentSound = f; localStorage.setItem('b_sound', f); updateUI(); }

        document.getElementById('main-image').src = currentSkin;
        updateUI();
    </script>
</body>
</html>
