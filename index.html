<script>
    const i18n = {
        ru: { click: "Клик", auto: "Авто", up: "Клик +1", autoUp: "Авто +1", alert: "Автокликер обнаружен!" },
        ua: { click: "Клік", auto: "Авто", up: "Клік +1", autoUp: "Авто +1", alert: "Автоклікер виявлено!" },
        en: { click: "Click", auto: "Auto", up: "Click +1", autoUp: "Auto +1", alert: "Autoclicker detected!" },
        bg: { click: "Клик", auto: "Авто", up: "Клик +1", autoUp: "Авто +1", alert: "Открит автокликер!" }
    };

    let clicks = parseInt(localStorage.getItem('b_clicks')) || 0;
    let power = parseInt(localStorage.getItem('b_power')) || 1;
    let autoPower = parseInt(localStorage.getItem('b_auto_power')) || 0;
    let volume = 0.5;
    let currentSound = 'звук нажатия.mp3';
    let currentSkin = 'банан.png';
    let lang = 'ru';
    let isBlocked = false;

    // --- Система защиты ---
    let clickTimes = [];
    let lastTime = 0;

    function playBulgarianVoice() {
        const input = document.getElementById('source-text').value;
        if(!input) return;
        const v = new Audio('болгарский язык.mp3');
        v.volume = volume;
        v.playbackRate = 1.2;
        v.play();
    }

    function setLang(l) {
        lang = l;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + l).classList.add('active');
        updateUI();
    }

    function setSound(s, id) {
        currentSound = s;
        document.getElementById('snd1').classList.remove('active');
        document.getElementById('snd2').classList.remove('active');
        document.getElementById(id).classList.add('active');
    }

    function changeVolume(v) { volume = v; }

    function updateUI() {
        const t = i18n[lang];
        document.getElementById('counter').innerText = clicks.toLocaleString();
        document.getElementById('power-display').innerText = `${t.click}: +${power}`;
        document.getElementById('auto-display').innerText = `${t.auto}: +${autoPower}/с`;
        
        document.getElementById('up-btn').innerText = `${t.up} (${power * 1000})`;
        document.getElementById('auto-up-btn').innerText = `${t.autoUp} (${(autoPower + 1) * 10000})`;

        localStorage.setItem('b_clicks', clicks);
        localStorage.setItem('b_power', power);
        localStorage.setItem('b_auto_power', autoPower);

        // Рендер скинов (кратко)
        const list = document.getElementById('skin-list');
        if (list.children.length <= 1) { // Чтобы не перерисовывать постоянно
            skinsDB.forEach(skin => {
                const card = document.createElement('div');
                card.className = "selector-card";
                card.onclick = () => {
                    if (clicks >= skin.price || currentSkin === skin.file) {
                        if (currentSkin !== skin.file) clicks -= skin.price;
                        currentSkin = skin.file;
                        document.getElementById('main-image').src = skin.file;
                        updateUI();
                    }
                };
                card.innerHTML = `<img src="${skin.file}" style="width:30px"> <span>${skin.name}</span>`;
                list.appendChild(card);
            });
        }
    }

    // ГЛАВНАЯ ЛОГИКА ПРОВЕРКИ
    document.getElementById('main-image').addEventListener('mousedown', function(e) {
        if (isBlocked) return;

        // 1. Проверка на эмуляцию
        if (!e.isTrusted) { activateBlock(); return; }

        const now = performance.now();
        const gap = now - lastTime;
        lastTime = now;

        clickTimes.push(gap);
        if (clickTimes.length > 20) clickTimes.shift();

        // 2. Анализ ритма (если последние 10 кликов слишком одинаковые)
        if (clickTimes.length >= 10) {
            const last10 = clickTimes.slice(-10);
            const diffs = [];
            for(let i=1; i<last10.length; i++) {
                diffs.push(Math.abs(last10[i] - last10[i-1]));
            }
            // Если среднее отклонение меньше 3мс - это бот
            const avgDiff = diffs.reduce((a,b) => a+b) / diffs.length;
            if (avgDiff < 3) { activateBlock(); return; }
        }

        // 3. Анализ скорости (больше 25 кликов в сек)
        const clicksLastSec = clickTimes.filter(t => t < 1000).length;
        if (clickHistoryCount() > 25) { activateBlock(); return; }

        // Клик разрешен
        clicks += power;
        let s = new Audio(currentSound); s.volume = volume; s.play();
        
        // Эффект +1
        const p = document.createElement('div');
        p.innerText = `+${power}`; p.className = 'plus-one';
        p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 600);
        updateUI();
    });

    function clickHistoryCount() {
        const now = performance.now();
        // Мы считаем количество вызовов mousedown за последнюю секунду
        if (!window.recentClicks) window.recentClicks = [];
        window.recentClicks.push(now);
        window.recentClicks = window.recentClicks.filter(t => now - t < 1000);
        return window.recentClicks.length;
    }

    function activateBlock() {
        isBlocked = true;
        const img = document.getElementById('main-image');
        img.style.filter = "grayscale(1) contrast(3) brightness(0.2)";
        document.getElementById('custom-alert').classList.add('show');
        
        setTimeout(() => {
            isBlocked = false;
            img.style.filter = "";
            document.getElementById('custom-alert').classList.remove('show');
            clickTimes = [];
            window.recentClicks = [];
        }, 5000);
    }

    function toggleTranslator(s) { document.getElementById('translator-page').style.display = s ? 'flex' : 'none'; }
    function buyUpgrade() { let c = power * 1000; if(clicks >= c){ clicks -= c; power++; updateUI(); } }
    function buyAutoUpgrade() { let c = (autoPower + 1) * 10000; if(clicks >= c){ clicks -= c; autoPower++; updateUI(); } }

    setInterval(() => { if(!isBlocked && autoPower > 0) { clicks += autoPower; updateUI(); } }, 1000);
    
    // Начальная загрузка скинов
    const skinsDB = [
        { name: 'Банан', file: 'банан.png', price: 0 },
        { name: 'Пу-пу-пу', file: 'пу-пу-пу.png', price: 1000 },
        { name: 'Бурмолдан', file: 'банан-бурмолдан.png', price: 5000 },
        { name: 'Ишак', file: 'ишак.png', price: 1000000 }
    ];

    updateUI();
</script>
