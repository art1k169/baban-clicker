<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Evolution: Translator Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --main: #ffcc00; --main-soft: rgba(255, 204, 0, 0.1);
            --panel: rgba(20, 20, 20, 0.9); --border: rgba(50, 50, 50, 0.5);
            --text-dark: #888; --success: #2ecc71; --blue: #3498db;
        }

        body {
            background-color: var(--bg); color: white; font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; user-select: none;
        }

        /* --- Переводчик (Страница внутри сайта) --- */
        #translator-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: none; flex-direction: column; align-items: center; padding-top: 50px;
        }
        .trans-container { width: 90%; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .trans-box { background: #111; border: 1px solid #333; border-radius: 12px; padding: 20px; height: 200px; position: relative; }
        .trans-header { color: var(--blue); font-size: 12px; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-family: inherit; resize: none; font-size: 18px; outline: none; height: 140px; }
        .listen-btn { position: absolute; bottom: 15px; right: 15px; background: none; border: none; cursor: pointer; font-size: 24px; color: #555; transition: 0.2s; }
        .listen-btn:hover { color: var(--main); transform: scale(1.1); }
        .back-btn { margin-top: 30px; background: #222; border: 1px solid #444; color: white; padding: 10px 25px; border-radius: 8px; cursor: pointer; }

        /* --- Остальной интерфейс --- */
        #custom-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--panel); backdrop-filter: blur(20px); border: 1px solid var(--border);
            padding: 30px; border-radius: 24px; z-index: 1000; text-align: center; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #custom-alert.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .alert-btn { background: var(--main); color: black; border: none; padding: 10px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; }

        .lang-selector { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 10px; }
        .lang-btn.active { background: var(--main); color: black; }
        .trans-btn-trigger { background: var(--blue); border: none; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 10px; font-weight: 700; }

        .main-stage { display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .stats-count { font-size: 6rem; font-weight: 900; color: var(--main); text-shadow: 0 0 40px rgba(255, 204, 0, 0.6); line-height: 1; }
        .stats-power { font-size: 1.1rem; color: var(--text-dark); margin-top: 5px; display: flex; gap: 20px; font-weight: 700; }
        #main-image { width: 380px; height: 380px; object-fit: contain; cursor: pointer; transition: 0.1s; }

        .side-panels-container { position: fixed; top: 20px; bottom: 20px; left: 20px; right: 20px; pointer-events: none; display: flex; justify-content: space-between; }
        .panel { width: 280px; background: var(--panel); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid var(--border); padding: 25px; pointer-events: auto; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .panel-header { font-size: 11px; font-weight: 700; color: var(--text-dark); text-transform: uppercase; letter-spacing: 2px; }

        .upgrade-btn { width: 100%; padding: 15px; background: var(--success); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; font-size: 12px; }
        .upgrade-btn.auto { background: var(--blue); }
        .upgrade-btn:disabled { background: #333; opacity: 0.5; }

        .selector-card { padding: 12px; background: rgba(40,40,40,0.5); border-radius: 16px; border: 2px solid transparent; text-align: center; cursor: pointer; margin-bottom: 10px; }
        .selector-card.active { border-color: var(--main); background: var(--main-soft); }
        .selector-card img { width: 45px; height: 45px; display: block; margin: 0 auto 8px; border-radius: 8px; }

        .plus-one { position: fixed; color: var(--main); font-weight: 900; font-size: 40px; pointer-events: none; animation: floatUp 0.7s forwards; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="translator-page">
        <h1 style="color: white; margin-bottom: 40px; font-weight: 400;">Google <span style="font-weight: 700;">Переводчик</span></h1>
        <div class="trans-container">
            <div class="trans-box">
                <div class="trans-header">Русский</div>
                <textarea id="source-text" placeholder="Введите текст..."></textarea>
            </div>
            <div class="trans-box">
                <div class="trans-header">Болгарский</div>
                <div style="height: 140px; display: flex; align-items: center; justify-content: center; color: #333; font-style: italic;">
                    Текст скрыт системой
                </div>
                <button class="listen-btn" onclick="speakBulgarian()">🔊</button>
            </div>
        </div>
        <button class="back-btn" onclick="toggleTranslator(false)">Вернуться в игру</button>
    </div>

    <div id="custom-alert">
        <h2 id="alert-title"></h2>
        <p id="alert-msg"></p>
        <button class="alert-btn" onclick="closeAlert()">ОК</button>
    </div>

    <div class="main-stage">
        <div class="stats-count" id="counter">0</div>
        <div class="stats-power">
            <span id="power-display">Клик: +1</span>
            <span id="auto-display" style="color: var(--blue);">Авто: +0/сек</span>
        </div>
        <img src="банан.png" id="main-image">
    </div>

    <div class="side-panels-container">
        <div class="panel">
            <div class="panel-header">Язык / Language</div>
            <div class="lang-selector">
                <button class="lang-btn active" onclick="setLang('ru')">RU</button>
                <button class="lang-btn" onclick="setLang('ua')">UA</button>
                <button class="lang-btn" onclick="setLang('en')">EN</button>
                <button class="lang-btn" onclick="setLang('bg')">BG (Secret)</button>
                <button class="trans-btn-trigger" onclick="toggleTranslator(true)">Переводчик</button>
            </div>

            <div class="panel-header">Прокачка</div>
            <button class="upgrade-btn" id="upgrade-btn" onclick="buyUpgrade()"></button>
            <button class="upgrade-btn auto" id="auto-upgrade-btn" onclick="buyAutoUpgrade()"></button>
            
            <div class="panel-header" style="margin-top: 10px;">Звук клика</div>
            <div style="display:flex; gap:10px;">
                <div class="lang-btn" id="snd1" onclick="setSound('звук нажатия.mp3', 'snd1')" style="flex:1; text-align:center">Звук 1</div>
                <div class="lang-btn" id="snd2" onclick="setSound('звук нажатия2.mp3', 'snd2')" style="flex:1; text-align:center">Звук 2</div>
            </div>

            <div class="panel-header" style="margin-top: 10px;">Громкость</div>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
        </div>

        <div class="panel">
            <div class="panel-header">Скины</div>
            <div class="selector-grid" id="skin-list"></div>
        </div>
    </div>

    <script>
        const i18n = {
            ru: { click: "Клик", auto: "Авто", upClick: "Клик +1", upAuto: "Авто +1", alertTitle: "Внимание", lowClicks: "Недостаточно кликов!", cheat: "Обнаружен скрипт!" },
            ua: { click: "Клік", auto: "Авто", upClick: "Клік +1", upAuto: "Авто +1", alertTitle: "Увага", lowClicks: "Недостатньо кліків!", cheat: "Виявлено скрипт!" },
            en: { click: "Click", auto: "Auto", upClick: "Click +1", upAuto: "Auto +1", alertTitle: "Warning", lowClicks: "Not enough clicks!", cheat: "Script detected!" },
            bg: { click: "Клик", auto: "Авто", upClick: "Клик +1", upAuto: "Авто +1", alertTitle: "Внимание", lowClicks: "Няма кликвания!", cheat: "Открит скрипт!" }
        };

        let lang = 'ru';
        let clicks = parseInt(localStorage.getItem('b_clicks')) || 0;
        let power = parseInt(localStorage.getItem('b_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('b_auto_power')) || 0;
        let volume = 0.5;
        let currentSound = 'звук нажатия.mp3';
        let currentSkin = 'банан.png';
        let unlockedSkins = ['skin0'];
        let bgMusic = new Audio('болгарский язык.mp3');
        bgMusic.loop = true;

        const skinsDB = [
            { id: 'skin0', name: 'Банан', file: 'банан.png', price: 0 },
            { id: 'skin1', name: 'Заяц 1', file: 'заяц1.png', price: 1000 },
            { id: 'skin2', name: 'Заяц 2', file: 'заяц2.png', price: 5000 },
            { id: 'skin3', name: 'Ишак', file: 'ишак.png', price: 10000 }
        ];

        function toggleTranslator(show) {
            document.getElementById('translator-page').style.display = show ? 'flex' : 'none';
        }

        function speakBulgarian() {
            const text = document.getElementById('source-text').value;
            if(!text) return;
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'bg-BG';
            
            // Динамическая интонация в зависимости от слов
            if (text.length < 10) {
                utterance.pitch = 1.5; // Тонкий/веселый
                utterance.rate = 1.2;
            } else if (text.includes('!')) {
                utterance.pitch = 2.0; // Эмоциональный
                utterance.volume = 1.0;
            } else {
                utterance.pitch = 0.8; // Грубый/серьезный
            }
            
            speechSynthesis.speak(utterance);
        }

        function setLang(l) {
            lang = l;
            if (l === 'bg') { bgMusic.volume = volume; bgMusic.play(); } 
            else { bgMusic.pause(); bgMusic.currentTime = 0; }
            updateUI();
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('counter').innerText = clicks.toLocaleString();
            document.getElementById('power-display').innerText = `${t.click}: +${power}`;
            document.getElementById('auto-display').innerText = `${t.auto}: +${autoPower}/с`;
            
            let upCost = power * 1000;
            let autoCost = (autoPower + 1) * 10000;
            document.getElementById('upgrade-btn').innerText = `${t.upClick} (${upCost})`;
            document.getElementById('auto-upgrade-btn').innerText = `${t.upAuto} (${autoCost})`;
            
            localStorage.setItem('b_clicks', clicks);
            renderSkins();
        }

        function renderSkins() {
            const container = document.getElementById('skin-list');
            container.innerHTML = '';
            skinsDB.forEach(skin => {
                const card = document.createElement('div');
                card.className = `selector-card ${currentSkin === skin.file ? 'active' : ''}`;
                card.onclick = () => { currentSkin = skin.file; document.getElementById('main-image').src = skin.file; updateUI(); };
                card.innerHTML = `<img src="${skin.file}"><span>${skin.name}</span>`;
                container.appendChild(card);
            });
        }

        document.getElementById('main-image').onmousedown = (e) => {
            clicks += power;
            let audio = new Audio(currentSound);
            audio.volume = volume;
            audio.play();
            
            const p = document.createElement('div');
            p.innerText = `+${power}`; p.className = 'plus-one';
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
            updateUI();
        };

        function changeVolume(v) { volume = v; bgMusic.volume = v; }
        function setSound(s, id) { currentSound = s; }
        function buyUpgrade() { if(clicks >= power*1000) { clicks -= power*1000; power++; updateUI(); } }
        function buyAutoUpgrade() { if(clicks >= (autoPower+1)*10000) { clicks -= (autoPower+1)*10000; autoPower++; updateUI(); } }

        setInterval(() => { if(autoPower > 0) { clicks += autoPower; updateUI(); } }, 1000);
        updateUI();
    </script>
</body>
</html>
