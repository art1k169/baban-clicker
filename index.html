<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Evolution: Anti-Cheat Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --main: #ffcc00; --panel: rgba(20, 20, 20, 0.9);
            --border: rgba(50, 50, 50, 0.5); --text-dark: #888; --blue: #3498db;
        }
        body { background-color: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; user-select: none; }
        
        #custom-alert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); background: var(--panel); backdrop-filter: blur(20px); border: 2px solid #ff4444; padding: 30px; border-radius: 24px; z-index: 3000; text-align: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        #custom-alert.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

        .main-stage { display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .stats-count { font-size: 6rem; font-weight: 900; color: var(--main); line-height: 1; }
        #main-image { width: 350px; height: 350px; object-fit: contain; cursor: pointer; transition: 0.1s; }
        #main-image.frozen { filter: grayscale(1) brightness(0.1) contrast(5); }

        .side-panels-container { position: fixed; top: 20px; bottom: 20px; left: 20px; right: 20px; pointer-events: none; display: flex; justify-content: space-between; }
        .panel { width: 260px; background: var(--panel); backdrop-filter: blur(15px); border-radius: 24px; border: 1px solid var(--border); padding: 20px; pointer-events: auto; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .upgrade-btn { width: 100%; padding: 12px; background: #2ecc71; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; font-size: 11px; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 10px; }
        .lang-btn.active { background: var(--main); color: black; }
        .plus-one { position: fixed; color: var(--main); font-weight: 900; font-size: 40px; pointer-events: none; animation: floatUp 0.6s forwards; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="custom-alert">
        <h2 style="margin:0; color: #ff4444;">ЧИТЫ ОБНАРУЖЕНЫ!</h2>
        <p>Автокликер заблокирован. <br> <b id="fine-text" style="color:var(--main)">Клики за сессию аннулированы.</b></p>
    </div>

    <div class="main-stage">
        <div class="stats-count" id="counter">0</div>
        <div style="display:flex; gap:15px; font-weight: 700; color: var(--text-dark);">
            <span id="power-display">Клик: +1</span>
            <span id="auto-display" style="color: var(--blue);">Авто: +0/с</span>
        </div>
        <img src="банан.png" id="main-image">
    </div>

    <div class="side-panels-container">
        <div class="panel">
            <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                <button class="lang-btn active" onclick="setLang('ru')">RU</button>
                <button class="lang-btn" onclick="setLang('ua')">UA</button>
                <button class="lang-btn" onclick="setLang('bg')">BG</button>
            </div>
            <button class="upgrade-btn" id="up-btn" onclick="buyUpgrade()">Клик +1</button>
            <button class="upgrade-btn" style="background:var(--blue)" id="auto-up-btn" onclick="buyAutoUpgrade()">Авто +1</button>
            <div style="font-size:10px; color:var(--text-dark); margin-top:10px;">ГРОМКОСТЬ</div>
            <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)" style="width:100%;">
        </div>
        <div class="panel" id="skin-list">
            <div style="font-size:10px; color:var(--text-dark); text-transform:uppercase;">ВАШИ СКИНЫ</div>
        </div>
    </div>

    <script>
        let clicks = parseInt(localStorage.getItem('b_clicks')) || 0;
        let power = parseInt(localStorage.getItem('b_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('b_auto_power')) || 0;
        let sessionEarned = 0; // Клики за текущий заход
        let volume = 0.5;
        let currentSkin = 'банан.png';
        let isBlocked = false;

        // Система защиты (2 секунды анализа)
        let clickData = []; 
        let lastTime = performance.now();
        let bgMusic = new Audio('болгарский язык.mp3'); bgMusic.loop = true;

        const skinsDB = [
            { name: 'Банан', file: 'банан.png', price: 0 },
            { name: 'Пу-пу-пу', file: 'пу-пу-пу.png', price: 1000 },
            { name: 'Бурмолдан', file: 'банан-бурмолдан.png', price: 5000 },
            { name: 'Заяц 1', file: 'заяц1.png', price: 50000 },
            { name: 'Заяц 2', file: 'заяц2.png', price: 150000 },
            { name: 'Бак', file: 'бак.png', price: 300000 },
            { name: 'Ишак', file: 'ишак.png', price: 1000000 },
            { name: 'Свинобан', file: 'свинобан.png', price: 5000000 }
        ];

        function setLang(l) {
            if (l === 'bg') bgMusic.play(); else bgMusic.pause();
        }

        function updateUI() {
            document.getElementById('counter').innerText = Math.floor(clicks).toLocaleString();
            document.getElementById('power-display').innerText = `Клик: +${power}`;
            document.getElementById('auto-display').innerText = `Авто: +${autoPower}/с`;
            document.getElementById('up-btn').innerText = `Клик +1 (${power * 1000})`;
            document.getElementById('auto-up-btn').innerText = `Авто +1 (${(autoPower+1)*10000})`;

            localStorage.setItem('b_clicks', clicks);
            localStorage.setItem('b_power', power);
            localStorage.setItem('b_auto_power', autoPower);

            const list = document.getElementById('skin-list');
            list.innerHTML = '<div style="font-size:10px; color:var(--text-dark);">ВАШИ СКИНЫ</div>';
            skinsDB.forEach(skin => {
                const card = document.createElement('div');
                card.style = `padding:8px; background:rgba(40,40,40,0.5); border-radius:12px; cursor:pointer; display:flex; align-items:center; gap:10px; margin-top:5px; border: 2px solid ${currentSkin === skin.file ? 'var(--main)' : 'transparent'}`;
                card.onclick = () => {
                    if (clicks >= skin.price || currentSkin === skin.file) {
                        if (currentSkin !== skin.file) clicks -= skin.price;
                        currentSkin = skin.file;
                        document.getElementById('main-image').src = skin.file;
                        updateUI();
                    }
                };
                card.innerHTML = `<img src="${skin.file}" style="width:30px; height:30px;"> <div><div style="font-size:11px;">${skin.name}</div><div style="font-size:9px; color:var(--main)">${skin.price}</div></div>`;
                list.appendChild(card);
            });
        }

        document.getElementById('main-image').onmousedown = function(e) {
            if (isBlocked || !e.isTrusted) return;

            const now = performance.now();
            const gap = now - lastTime;
            lastTime = now;

            // Собираем данные за 2 секунды
            clickData.push({ gap: gap, time: now });
            clickData = clickData.filter(d => now - d.time < 2000);

            if (clickData.length >= 15) {
                const gaps = clickData.map(d => d.gap).filter(g => g > 0);
                const avg = gaps.reduce((a, b) => a + b) / gaps.length;
                // Проверка на вариативность (человек кликает "криво", бот - "ровно")
                const variance = gaps.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / gaps.length;

                // Если за 2 секунды ритм слишком идеальный (variance < 2.5) или скорость > 25 кпс
                if (variance < 2.5 || (clickData.length / 2) > 25) {
                    activateBlock();
                    return;
                }
            }

            // Успешный клик
            clicks += power;
            sessionEarned += power;
            let s = new Audio('звук нажатия.mp3'); s.volume = volume; s.play();
            
            const p = document.createElement('div');
            p.innerText = `+${power}`; p.className = 'plus-one';
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);
            updateUI();
        };

        function activateBlock() {
            isBlocked = true;
            // ШТРАФ: Забираем все клики, заработанные за сессию
            clicks -= sessionEarned;
            if (clicks < 0) clicks = 0;
            sessionEarned = 0;

            document.getElementById('main-image').classList.add('frozen');
            document.getElementById('custom-alert').classList.add('show');
            
            setTimeout(() => {
                isBlocked = false;
                document.getElementById('main-image').classList.remove('frozen');
                document.getElementById('custom-alert').classList.remove('show');
                clickData = [];
            }, 5000);
            updateUI();
        }

        function buyUpgrade() { let c = power * 1000; if(clicks >= c){ clicks -= c; power++; updateUI(); } }
        function buyAutoUpgrade() { let c = (autoPower + 1) * 10000; if(clicks >= c){ clicks -= c; autoPower++; updateUI(); } }
        function changeVolume(v) { volume = v; bgMusic.volume = v; }

        setInterval(() => { 
            if(!isBlocked && autoPower > 0) { 
                clicks += autoPower; 
                sessionEarned += autoPower;
                updateUI(); 
            } 
        }, 1000);

        updateUI();
    </script>
</body>
</html>
