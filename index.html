<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banana Evolution: International</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a; --main: #ffcc00; --main-soft: rgba(255, 204, 0, 0.1);
            --panel: rgba(20, 20, 20, 0.9); --border: rgba(50, 50, 50, 0.5);
            --text-dark: #888; --success: #2ecc71; --blue: #3498db;
        }

        body {
            background-color: var(--bg); color: white; font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; user-select: none;
        }

        /* --- UI элементы --- */
        #custom-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: var(--panel); backdrop-filter: blur(20px); border: 1px solid var(--border);
            padding: 30px; border-radius: 24px; z-index: 1000; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #custom-alert.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }
        .alert-btn { background: var(--main); color: black; border: none; padding: 10px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; }

        .lang-selector { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
        .lang-btn { background: #222; border: 1px solid #444; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 10px; transition: 0.2s; }
        .lang-btn.active { background: var(--main); color: black; border-color: var(--main); }

        .main-stage { display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .stats-count { font-size: 6rem; font-weight: 900; color: var(--main); text-shadow: 0 0 40px rgba(255, 204, 0, 0.6); line-height: 1; }
        .stats-power { font-size: 1.1rem; color: var(--text-dark); margin-top: 5px; display: flex; gap: 20px; font-weight: 700; }
        #main-image { width: 380px; height: 380px; object-fit: contain; cursor: pointer; transition: 0.1s; }

        .side-panels-container { position: fixed; top: 20px; bottom: 20px; left: 20px; right: 20px; pointer-events: none; display: flex; justify-content: space-between; }
        .panel { width: 280px; background: var(--panel); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid var(--border); padding: 25px; pointer-events: auto; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        .panel-header { font-size: 11px; font-weight: 700; color: var(--text-dark); text-transform: uppercase; letter-spacing: 2px; }

        .upgrade-btn { width: 100%; padding: 15px; background: var(--success); border: none; border-radius: 16px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .upgrade-btn.auto { background: var(--blue); }
        .upgrade-btn:disabled { background: #333; opacity: 0.5; }

        .selector-grid { display: flex; flex-direction: column; gap: 10px; }
        .selector-card { padding: 12px; background: rgba(40,40,40,0.5); border-radius: 16px; border: 2px solid transparent; text-align: center; cursor: pointer; }
        .selector-card.active { border-color: var(--main); background: var(--main-soft); }
        .selector-card img { width: 45px; height: 45px; display: block; margin: 0 auto 8px; border-radius: 8px; }

        .plus-one { position: fixed; color: var(--main); font-weight: 900; font-size: 40px; pointer-events: none; animation: floatUp 0.7s forwards; z-index: 100; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-150px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="custom-alert">
        <h2 id="alert-title"></h2>
        <p id="alert-msg"></p>
        <button class="alert-btn" id="alert-confirm-btn" onclick="closeAlert()">ОК</button>
    </div>

    <div class="main-stage">
        <div class="stats-count" id="counter">0</div>
        <div class="stats-power">
            <span id="power-display">Клик: +1</span>
            <span id="auto-display" style="color: var(--blue);">Авто: +0/сек</span>
        </div>
        <img src="банан.png" id="main-image">
    </div>

    <div class="side-panels-container">
        <div class="panel">
            <div class="panel-header" id="header-lang">Язык / Language</div>
            <div class="lang-selector">
                <button class="lang-btn" onclick="setLang('ru')">RU</button>
                <button class="lang-btn" onclick="setLang('ua')">UA</button>
                <button class="lang-btn" onclick="setLang('en')">EN</button>
                <button class="lang-btn" onclick="setLang('bg')">BG (Secret)</button>
            </div>

            <div class="panel-header" id="header-upgrades">Прокачка</div>
            <button class="upgrade-btn" id="upgrade-btn" onclick="buyUpgrade()"></button>
            <button class="upgrade-btn auto" id="auto-upgrade-btn" onclick="buyAutoUpgrade()"></button>
            
            <div class="panel-header" id="header-volume" style="margin-top: 10px;">Громкость</div>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
        </div>

        <div class="panel">
            <div class="panel-header" id="header-skins">Скины</div>
            <div class="selector-grid" id="skin-list"></div>
        </div>
    </div>

    <script>
        // Переводы
        const i18n = {
            ru: { click: "Клик", auto: "Авто", upClick: "Клик +1", upAuto: "Авто +1", shop: "Магазин", buy: "КУПИТЬ", ban: "Бан на 5 сек", cheat: "Обнаружен скрипт!", alertTitle: "Внимание", lowClicks: "Недостаточно кликов!", vol: "Громкость", skins: "Скины" },
            ua: { click: "Клік", auto: "Авто", upClick: "Клік +1", upAuto: "Авто +1", shop: "Магазин", buy: "КУПИТИ", ban: "Бан на 5 сек", cheat: "Виявлено скрипт!", alertTitle: "Увага", lowClicks: "Недостатньо кліків!", vol: "Гучність", skins: "Скіни" },
            en: { click: "Click", auto: "Auto", upClick: "Click +1", upAuto: "Auto +1", shop: "Shop", buy: "BUY", ban: "Ban for 5 sec", cheat: "Script detected!", alertTitle: "Warning", lowClicks: "Not enough clicks!", vol: "Volume", skins: "Skins" },
            bg: { click: "Клик", auto: "Авто", upClick: "Клик +1", upAuto: "Авто +1", shop: "Магазин", buy: "КУПИ", ban: "Бан за 5 сек", cheat: "Открит скрипт!", alertTitle: "Внимание", lowClicks: "Няма достатъчно кликвания!", vol: "Сила на звука", skins: "Скинове" }
        };

        let lang = localStorage.getItem('b_lang') || 'ru';
        let clicks = parseInt(localStorage.getItem('b_clicks')) || 0;
        let power = parseInt(localStorage.getItem('b_power')) || 1;
        let autoPower = parseInt(localStorage.getItem('b_auto_power')) || 0;
        let volume = parseFloat(localStorage.getItem('b_volume')) || 0.5;
        let currentSkin = localStorage.getItem('b_skin') || 'банан.png';
        let unlockedSkins = JSON.parse(localStorage.getItem('b_unlocked')) || ['skin0'];
        
        let lastClickTime = 0;
        let clickHistory = []; 
        let isFrozen = false;
        let bgMusic = new Audio('болгарский язык.mp3');
        bgMusic.loop = true;

        const skinsDB = [
            { id: 'skin0', name: 'Banana', file: 'банан.png', price: 0 },
            { id: 'skin_pupu', name: 'Pu-pu-pu', file: 'пу-пу-пу.png', price: 1000 },
            { id: 'skin_burm', name: 'Burmoll', file: 'банан-бурмолдан.png', price: 5000 },
            { id: 'skin1', name: 'Rabbit 1', file: 'заяц1.png', price: 500000 },
            { id: 'skin2', name: 'Rabbit 2', file: 'заяц2.png', price: 1000000 },
            { id: 'skin_bak', name: 'Bak', file: 'бак.png', price: 1000000 },
            { id: 'skin3', name: 'Ishak', file: 'ишак.png', price: 10000000 },
            { id: 'skin_svin', name: 'Svinoban', file: 'свинобан.png', price: 20000000 }
        ];

        function setLang(l) {
            lang = l;
            localStorage.setItem('b_lang', l);
            
            // Логика болгарского звука
            if (l === 'bg') {
                bgMusic.volume = volume;
                bgMusic.play().catch(e => console.log("Нужен клик для музыки"));
            } else {
                bgMusic.pause();
                bgMusic.currentTime = 0;
            }

            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.innerText.toLowerCase().includes(l));
            });
            updateUI();
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('counter').innerText = clicks.toLocaleString('ru-RU');
            document.getElementById('power-display').innerText = `${t.click}: +${power}`;
            document.getElementById('auto-display').innerText = `${t.auto}: +${autoPower}/s`;
            
            document.getElementById('header-upgrades').innerText = t.upClick;
            document.getElementById('header-skins').innerText = t.skins;
            document.getElementById('header-volume').innerText = t.vol;

            let upCost = power * 1000;
            let autoCost = (autoPower + 1) * 10000;
            document.getElementById('upgrade-btn').innerText = `${t.upClick} (${upCost.toLocaleString()})`;
            document.getElementById('upgrade-btn').disabled = clicks < upCost;
            document.getElementById('auto-upgrade-btn').innerText = `${t.upAuto} (${autoCost.toLocaleString()})`;
            document.getElementById('auto-upgrade-btn').disabled = clicks < autoCost;

            localStorage.setItem('b_clicks', clicks);
            localStorage.setItem('b_power', power);
            localStorage.setItem('b_auto_power', autoPower);
            renderSkins();
        }

        function renderSkins() {
            const container = document.getElementById('skin-list');
            container.innerHTML = '';
            skinsDB.forEach(skin => {
                const isUnlocked = unlockedSkins.includes(skin.id);
                const isActive = currentSkin === skin.file;
                const card = document.createElement('div');
                card.className = `selector-card ${isActive ? 'active' : ''}`;
                card.onclick = () => handleSkinClick(skin);
                card.innerHTML = `
                    <img src="${skin.file}" style="${!isUnlocked ? 'filter:grayscale(1) brightness(0.4)' : ''}">
                    <span>${skin.name}</span>
                    ${!isUnlocked ? `<div style="font-size:10px; color:var(--main)">${skin.price.toLocaleString()}</div>` : ''}
                `;
                container.appendChild(card);
            });
        }

        function handleSkinClick(skin) {
            if (unlockedSkins.includes(skin.id)) {
                currentSkin = skin.file;
                document.getElementById('main-image').src = skin.file;
                localStorage.setItem('b_skin', skin.file);
            } else if (clicks >= skin.price) {
                clicks -= skin.price;
                unlockedSkins.push(skin.id);
                localStorage.setItem('b_unlocked', JSON.stringify(unlockedSkins));
                currentSkin = skin.file;
                document.getElementById('main-image').src = skin.file;
            } else {
                showAlert(i18n[lang].alertTitle, i18n[lang].lowClicks);
            }
            updateUI();
        }

        document.getElementById('main-image').onmousedown = (e) => {
            if (isFrozen) return;
            // Если выбран BG, включаем музыку при первом клике (политика браузеров)
            if (lang === 'bg' && bgMusic.paused) bgMusic.play();

            const now = Date.now();
            const interval = now - lastClickTime;
            clickHistory.push(interval);
            if (clickHistory.length > 10) clickHistory.shift();

            if (clickHistory.length === 10) {
                const avg = clickHistory.reduce((a, b) => a + b) / 10;
                const variance = clickHistory.map(x => Math.pow(x - avg, 2)).reduce((a, b) => a + b) / 10;
                if (variance < 2 && avg < 100) { activateAntiCheat(i18n[lang].cheat); return; }
            }

            lastClickTime = now;
            clicks += power;
            let audio = new Audio('звук нажатия.mp3');
            audio.volume = volume;
            audio.play();

            const p = document.createElement('div');
            p.innerText = `+${power}`; p.className = 'plus-one';
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);

            e.target.style.transform = 'scale(0.85)';
            setTimeout(() => e.target.style.transform = 'scale(1)', 50);
            updateUI();
        };

        function activateAntiCheat(reason) {
            isFrozen = true;
            document.getElementById('main-image').style.filter = 'grayscale(1) opacity(0.3)';
            showAlert(i18n[lang].alertTitle, `${reason} ${i18n[lang].ban}`);
            setTimeout(() => {
                isFrozen = false;
                document.getElementById('main-image').style.filter = 'none';
                closeAlert();
                clickHistory = [];
            }, 5000);
        }

        setInterval(() => { if (autoPower > 0 && document.visibilityState === 'visible') { clicks += autoPower; updateUI(); } }, 1000);
        
        function showAlert(title, msg) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('custom-alert').classList.add('show');
        }
        function closeAlert() { document.getElementById('custom-alert').classList.remove('show'); }
        function changeVolume(v) { 
            volume = v; 
            localStorage.setItem('b_volume', v); 
            bgMusic.volume = v;
        }
        function buyUpgrade() { let cost = power * 1000; if (clicks >= cost) { clicks -= cost; power++; updateUI(); } }
        function buyAutoUpgrade() { let cost = (autoPower + 1) * 10000; if (clicks >= cost) { clicks -= cost; autoPower++; updateUI(); } }

        // Инициализация
        document.getElementById('main-image').src = currentSkin;
        setLang(lang);
    </script>
</body>
</html>
